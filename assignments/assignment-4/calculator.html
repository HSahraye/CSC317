<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }

        .calculator {
            width: 100%;
            max-width: 400px;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
        }

        .display {
            padding: 20px;
            text-align: right;
            color: white;
            font-size: 48px;
            height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            overflow: hidden;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 20px;
        }

        button {
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 32px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        .gray {
            background-color: #a5a5a5;
            color: black;
        }

        .dark-gray {
            background-color: #333;
            color: white;
        }

        .orange {
            background-color: #ff9f0a;
            color: white;
        }

        .zero {
            grid-column: span 2;
            width: 100%;
            border-radius: 40px;
            text-align: left;
            padding-left: 30px;
        }

        @media (max-width: 400px) {
            .calculator {
                max-width: 100%;
            }

            button {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">0</div>
        <div class="buttons">
            <button class="gray">AC</button>
            <button class="gray">+/-</button>
            <button class="gray">%</button>
            <button class="orange">÷</button>
            
            <button class="dark-gray">7</button>
            <button class="dark-gray">8</button>
            <button class="dark-gray">9</button>
            <button class="orange">×</button>
            
            <button class="dark-gray">4</button>
            <button class="dark-gray">5</button>
            <button class="dark-gray">6</button>
            <button class="orange">-</button>
            
            <button class="dark-gray">1</button>
            <button class="dark-gray">2</button>
            <button class="dark-gray">3</button>
            <button class="orange">+</button>
            
            <button class="dark-gray zero">0</button>
            <button class="dark-gray">.</button>
            <button class="orange">=</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
